<div class="container my-4">

  <div class="admin-table-card">

    <!-- Header -->
    <div class="admin-table-header d-flex justify-content-between align-items-center flex-wrap">
      <h5 class="mb-2 mb-sm-0 text-white fw-semibold">
        User Role Management
      </h5>

      <span class="total-badge">
        {{ users.length }} Users
      </span>
    </div>

    <div class="table-responsive">

      <table class="table align-middle mb-0 admin-table">

        <thead>
          <tr>
            <th>#</th>
            <th>User</th>
            <th class="d-none d-lg-table-cell">Email</th>
            <th>Role</th>
            <th class="text-lg-end">Action</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let user of users; let i = index">

            <!-- Index -->
            <td class="index">{{ i + 1 }}</td>

            <!-- Name + Mobile Email -->
            <td>
              <div class="fw-semibold name-text">
                {{ user.fname }} {{ user.lname }}
              </div>

              <!-- Email for mobile -->
              <small class="text-muted d-block d-lg-none">
                {{ user.email }}
              </small>
            </td>

            <!-- Desktop Email -->
            <td class="text-muted d-none d-lg-table-cell email-text">
              {{ user.email }}
            </td>

            <!-- Role -->
            <td>
              <span class="role-badge"
                [ngClass]="user.role === 'admin' ? 'admin' : 'user'">
                {{ user.role }}
              </span>
            </td>

            <!-- Action Buttons -->
            <td class="text-lg-end">

              <div class="d-flex justify-content-lg-end gap-2 flex-wrap">

                <!-- Make Admin -->
                <button *ngIf="user.role !== 'admin'"
                        class="icon-btn make-btn"
                        (click)="makeAdmin(user)"
                        title="Make Admin">
                  <i class="bi bi-shield-check"></i>
                </button>

                <!-- Remove Admin -->
                <button *ngIf="user.role === 'admin'"
                        class="icon-btn remove-btn"
                        (click)="removeAdmin(user)"
                        title="Remove Admin">
                  <i class="bi bi-shield-x"></i>
                </button>

              </div>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
